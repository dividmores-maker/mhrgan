<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كورة - المراحل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;
    --bg2:#161a22;
    --gold:#d4af37;
    --gold-soft:#e9c766;
    --text:#f2f0ea;
    --text-dim:#9aa0ab;
    --line:rgba(212,175,55,0.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 20% 10%, rgba(212,175,55,0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(212,175,55,0.05), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    padding:24px 20px 60px;
  }
  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:var(--text-dim);
    text-decoration:none;
    font-size:13px;
    border:1px solid var(--line);
    padding:8px 14px;
    border-radius:999px;
    transition:border-color .2s ease, color .2s ease;
  }
  .back-btn:hover{border-color:var(--gold);color:var(--gold-soft);}
  header{
    text-align:center;
    margin:30px 0 44px;
  }
  header .eyebrow{
    color:var(--gold);
    letter-spacing:4px;
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
  }
  header h1{
    font-size:32px;
    font-weight:900;
    margin-top:10px;
  }
  header p{
    color:var(--text-dim);
    margin-top:8px;
    font-size:14px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:18px;
    max-width:900px;
    margin:0 auto;
  }
  .card{
    background:linear-gradient(160deg, var(--bg2), #10131a);
    border:1px solid var(--line);
    border-radius:16px;
    padding:30px 18px;
    text-align:center;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .card::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(212,175,55,0.08), transparent 60%);
    opacity:0;
    transition:opacity .25s ease;
  }
  .card:hover{
    transform:translateY(-6px);
    border-color:var(--gold);
    box-shadow:0 14px 30px rgba(0,0,0,0.45);
  }
  .card:hover::before{opacity:1;}
  .stage-num{
    width:56px;height:56px;
    margin:0 auto 16px;
    display:flex;align-items:center;justify-content:center;
    border-radius:50%;
    background:rgba(212,175,55,0.08);
    border:1px solid var(--line);
    font-size:22px;
    font-weight:900;
    color:var(--gold-soft);
    position:relative;
    z-index:1;
  }
  .card h2{
    font-size:17px;
    font-weight:700;
    position:relative;
    z-index:1;
  }
  .card span.tag{
    display:block;
    margin-top:6px;
    font-size:11px;
    color:var(--text-dim);
    position:relative;
    z-index:1;
  }
  @media (max-width:480px){
    header h1{font-size:24px;}
    .grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<a class="back-btn" href="games.html">→ رجوع للألعاب</a>

<header>
  <div class="eyebrow">دوري التسلية</div>
  <h1>كورة</h1>
  <p>اختر المرحلة</p>
</header>

<div class="grid">

  <div class="card" onclick="location.href='football-stage.html?stage=1'">
    <div class="stage-num">١</div>
    <h2>المرحلة الأولى</h2>
    <span class="tag">STAGE 1</span>
  </div>

  <div class="card" onclick="location.href='football-stage.html?stage=2'">
    <div class="stage-num">٢</div>
    <h2>المرحلة الثانية</h2>
    <span class="tag">STAGE 2</span>
  </div>

  <div class="card" onclick="location.href='football-stage.html?stage=3'">
    <div class="stage-num">٣</div>
    <h2>المرحلة الثالثة</h2>
    <span class="tag">STAGE 3</span>
  </div>

  <div class="card" onclick="location.href='football-stage.html?stage=4'">
    <div class="stage-num">٤</div>
    <h2>المرحلة الرابعة</h2>
    <span class="tag">STAGE 4</span>
  </div>

</div>

</body>
</html>
