<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المرحلة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;
    --bg2:#161a22;
    --gold:#d4af37;
    --gold-soft:#e9c766;
    --text:#f2f0ea;
    --text-dim:#9aa0ab;
    --line:rgba(212,175,55,0.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 20% 10%, rgba(212,175,55,0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(212,175,55,0.05), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    padding:24px 20px 60px;
  }
  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:var(--text-dim);
    text-decoration:none;
    font-size:13px;
    border:1px solid var(--line);
    padding:8px 14px;
    border-radius:999px;
    transition:border-color .2s ease, color .2s ease;
  }
  .back-btn:hover{border-color:var(--gold);color:var(--gold-soft);}
  header{
    text-align:center;
    margin:30px 0 44px;
  }
  header .eyebrow{
    color:var(--gold);
    letter-spacing:4px;
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
  }
  header h1{
    font-size:32px;
    font-weight:900;
    margin-top:10px;
  }
  header p{
    color:var(--text-dim);
    margin-top:8px;
    font-size:14px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:18px;
    max-width:900px;
    margin:0 auto;
  }
  .card{
    background:linear-gradient(160deg, var(--bg2), #10131a);
    border:1px solid var(--line);
    border-radius:16px;
    padding:30px 18px;
    text-align:center;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .card::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(212,175,55,0.08), transparent 60%);
    opacity:0;
    transition:opacity .25s ease;
  }
  .card:hover{
    transform:translateY(-6px);
    border-color:var(--gold);
    box-shadow:0 14px 30px rgba(0,0,0,0.45);
  }
  .card:hover::before{opacity:1;}
  .icon-wrap{
    width:56px;height:56px;
    margin:0 auto 16px;
    display:flex;align-items:center;justify-content:center;
    border-radius:50%;
    background:rgba(212,175,55,0.08);
    border:1px solid var(--line);
    position:relative;
    z-index:1;
  }
  .icon-wrap svg{width:26px;height:26px;stroke:var(--gold-soft);fill:none;stroke-width:1.6;}
  .card h2{
    font-size:17px;
    font-weight:700;
    position:relative;
    z-index:1;
  }
  .card span.tag{
    display:block;
    margin-top:6px;
    font-size:11px;
    color:var(--text-dim);
    position:relative;
    z-index:1;
  }
  @media (max-width:480px){
    header h1{font-size:24px;}
    .grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<a class="back-btn" href="football.html">→ رجوع للمراحل</a>

<header>
  <div class="eyebrow">دوري التسلية</div>
  <h1 id="stageTitle">المرحلة</h1>
  <p>اختر</p>
</header>

<div class="grid">

  <div class="card" id="teamsCard">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3"/><path d="M2 20c0-3.5 2.5-6 6-6s6 2.5 6 6"/><circle cx="17" cy="8" r="2.5"/><path d="M14 14.5c.6-.3 1.3-.5 2-.5 3 0 5.5 2.5 5.5 6"/></svg>
    </div>
    <h2>الفرق</h2>
    <span class="tag">TEAMS</span>
  </div>

  <div class="card" id="drawCard">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8" cy="8" r="1.2" fill="var(--gold-soft)"/><circle cx="16" cy="8" r="1.2" fill="var(--gold-soft)"/><circle cx="8" cy="16" r="1.2" fill="var(--gold-soft)"/><circle cx="16" cy="16" r="1.2" fill="var(--gold-soft)"/><circle cx="12" cy="12" r="1.2" fill="var(--gold-soft)"/></svg>
    </div>
    <h2>القرعة</h2>
    <span class="tag">DRAW</span>
  </div>

  <div class="card" id="goalsCard">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 6l3 2-1 4h-4l-1-4z"/><path d="M12 3v3M12 18v3M4.5 8l3-1M16.5 7l3 1M4.5 16l3 1M16.5 17l3-1"/></svg>
    </div>
    <h2>الأهداف</h2>
    <span class="tag">GOALS</span>
  </div>

  <div class="card" id="resultsCard">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><path d="M9 21v-6M15 21v-10M4 21h16"/><path d="M6 15V9a3 3 0 013-3M18 11V7a3 3 0 00-3-3"/></svg>
    </div>
    <h2>النتائج</h2>
    <span class="tag">RESULTS</span>
  </div>

</div>

<script>
  // رقم المرحلة بييجي من الرابط: football-stage.html?stage=1
  const params = new URLSearchParams(window.location.search);
  const stage = params.get('stage') || '1';

  const stageNames = {
    '1': 'المرحلة الأولى',
    '2': 'المرحلة الثانية',
    '3': 'المرحلة الثالثة',
    '4': 'المرحلة الرابعة'
  };

  document.getElementById('stageTitle').textContent = stageNames[stage] || 'المرحلة';
  document.title = stageNames[stage] || 'المرحلة';

  document.getElementById('teamsCard').onclick = () => location.href = `teams.html?stage=${stage}`;
  document.getElementById('drawCard').onclick = () => location.href = `draw.html?stage=${stage}`;
  document.getElementById('goalsCard').onclick = () => location.href = `goals.html?stage=${stage}`;
  document.getElementById('resultsCard').onclick = () => location.href = `results.html?stage=${stage}`;
</script>

</body>
</html>
