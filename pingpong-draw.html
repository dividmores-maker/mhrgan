<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرعة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0714;
    --bg2:#150a29;
    --violet:#a855f7;
    --pink:#f0399e;
    --cyan:#22e0e0;
    --lime:#b6ff3c;
    --amber:#ffb020;
    --text:#f7f4ff;
    --text-dim:#a79ecb;
    --line:rgba(168,85,247,0.22);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    padding:24px 20px 70px;
    position:relative;
    overflow-x:hidden;
  }

  .blobs{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .blobs::before,.blobs::after{
    content:''; position:absolute; width:52vw; height:52vw; max-width:620px; max-height:620px;
    border-radius:50%; filter:blur(90px); opacity:0.35;
  }
  .blobs::before{ top:-14%; right:-12%; background:radial-gradient(circle, var(--violet), transparent 70%); animation:drift1 16s ease-in-out infinite; }
  .blobs::after{ bottom:-16%; left:-10%; background:radial-gradient(circle, var(--cyan), transparent 70%); animation:drift2 18s ease-in-out infinite; }
  .blob-mid{
    position:absolute; top:38%; left:50%; width:40vw; height:40vw; max-width:480px; max-height:480px;
    border-radius:50%; filter:blur(100px); opacity:0.2; background:radial-gradient(circle, var(--pink), transparent 70%);
    transform:translate(-50%,-50%); animation:drift3 20s ease-in-out infinite;
  }
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-6%,8%) scale(1.1);}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(6%,-8%) scale(1.08);}}
  @keyframes drift3{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-46%,-56%) scale(1.15);}}
  .grain{
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.4;
    background-image:radial-gradient(rgba(255,255,255,0.5) 0.5px, transparent 0.5px);
    background-size:3px 3px; mix-blend-mode:overlay;
  }
  .logo-watermark{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:min(60vw, 420px);
    height:auto;
    opacity:0.14;
    z-index:0;
    pointer-events:none;
    filter:drop-shadow(0 0 30px rgba(168,85,247,0.25));
  }

  .back-btn{
    position:relative; z-index:1;
    display:inline-flex; align-items:center; gap:6px;
    color:var(--text-dim); text-decoration:none; font-size:13px;
    border:1px solid rgba(168,85,247,0.28);
    background:rgba(21,10,41,0.5);
    padding:8px 16px; border-radius:999px;
    backdrop-filter:blur(4px);
    transition:border-color .2s ease, color .2s ease, box-shadow .2s ease;
  }
  .back-btn:hover{ border-color:var(--violet); color:var(--text); box-shadow:0 0 16px rgba(168,85,247,0.3); }

  header{ position:relative; z-index:1; text-align:center; margin:30px 0 40px; }
  header .eyebrow{
    display:inline-flex; align-items:center; gap:10px;
    background:linear-gradient(90deg, var(--pink), var(--violet), var(--cyan));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:5px; font-family:'Orbitron',sans-serif; font-size:11px; font-weight:800; text-transform:uppercase;
  }
  header h1{
    font-size:clamp(24px, 5vw, 30px); font-weight:900; margin-top:12px; color:var(--text);
    text-shadow:0 0 40px rgba(168,85,247,0.35); letter-spacing:0.5px;
  }
  header p{ color:var(--text-dim); margin-top:8px; font-size:14px; }

  .panel{
    position:relative; z-index:1;
    max-width:560px;
    margin:0 auto;
    background:linear-gradient(160deg, var(--bg2), #0e0620);
    border:1px solid var(--line);
    border-radius:18px;
    padding:28px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }

  .group-title{
    font-size:13px;
    font-family:'Orbitron',sans-serif;
    color:var(--cyan);
    letter-spacing:1.5px;
    font-weight:700;
    margin:22px 4px 12px;
  }
  .group-title:first-child{ margin-top:0; }

  .result-list{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .result-row{
    display:flex;
    align-items:center;
    gap:14px;
    background:linear-gradient(180deg, rgba(168,85,247,0.1), transparent);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    opacity:0;
    transform:translateY(10px);
    animation:revealRow .45s ease forwards;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .result-row:hover{
    border-color:var(--violet);
    box-shadow:0 0 20px rgba(168,85,247,0.25);
  }
  @keyframes revealRow{
    to{ opacity:1; transform:translateY(0); }
  }
  .result-row .rank{
    width:34px;height:34px;
    flex:0 0 auto;
    border-radius:50%;
    background:linear-gradient(135deg, var(--pink), var(--violet));
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-weight:900;
    font-size:14px;
    box-shadow:0 0 14px rgba(168,85,247,0.4);
  }
  .result-row .player-name{
    font-size:15px;
    font-weight:700;
    color:var(--text);
    flex:1;
  }
  .result-row .player-age{
    font-size:11px;
    color:var(--text-dim);
    flex-shrink:0;
  }

  .spinner-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    padding:30px 0;
  }
  .spinner{
    width:52px;height:52px;
    border-radius:50%;
    border:3px solid var(--line);
    border-top-color:var(--violet);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .hint{
    text-align:center;
    color:var(--text-dim);
    font-size:13px;
  }
  .empty-hint{
    text-align:center;
    color:var(--text-dim);
    font-size:14px;
    padding:50px 10px;
  }
  .screen{ display:none; }
  .screen.active{ display:block; }
</style>
</head>
<body>

<div class="blobs"><div class="blob-mid"></div></div>
<div class="grain"></div>
<img class="logo-watermark" src="logo.png" alt="لجنة الأنشطة والمسابقات">

<a class="back-btn" id="backLink" href="pingpong-stage.html">→ رجوع للمرحلة</a>

<header>
  <div class="eyebrow">دوري التسلية</div>
  <h1 id="pageTitle">القرعة</h1>
  <p id="pageSubtitle">نتيجة القرعة</p>
</header>

<div class="panel">

  <!-- شاشة التحميل -->
  <div class="screen active" id="loadingScreen">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="hint">بنجيب نتيجة القرعة...</div>
    </div>
  </div>

  <!-- لسه ملهاش قرعة -->
  <div class="screen" id="emptyScreen">
    <div class="empty-hint">القرعة لسه ما اتعملتش للمرحلة دي</div>
  </div>

  <!-- نتيجة القرعة -->
  <div class="screen" id="resultScreen">
    <div id="resultList"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA3-lEsXUrT-TV8aPMFnfqK32SPpkS2UXY",
    authDomain: "mhrgan-f86f9.firebaseapp.com",
    projectId: "mhrgan-f86f9",
    storageBucket: "mhrgan-f86f9.firebasestorage.app",
    messagingSenderId: "105084606310",
    appId: "1:105084606310:web:84f4433c113599eba29aa7"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const params = new URLSearchParams(window.location.search);
  const stage = params.get('stage') || '1';
  const game = 'pingpong';

  const stageNames = {
    '1': 'المرحلة الأولى',
    '2': 'المرحلة الثانية'
  };

  document.title = 'قرعة ' + (stageNames[stage] || 'المرحلة');
  document.getElementById('pageSubtitle').textContent = stageNames[stage] || 'المرحلة';
  document.getElementById('backLink').href = `pingpong-stage.html?stage=${stage}`;

  const loadingScreen = document.getElementById('loadingScreen');
  const emptyScreen = document.getElementById('emptyScreen');
  const resultScreen = document.getElementById('resultScreen');
  const screens = [loadingScreen, emptyScreen, resultScreen];

  function showScreen(el){
    screens.forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  }

  // كل "فريق" بيمثل لاعب واحد في الدومينو
  function normalizeTeamAsPlayer(team){
    const p = (Array.isArray(team.players) && team.players[0]) ? team.players[0] : {};
    return { name: team.name || p.name || '', age: p.age || '' };
  }

  function buildRow(player, rankNum, delayIndex){
    const row = document.createElement('div');
    row.className = 'result-row';
    row.style.animationDelay = (delayIndex * 0.1) + 's';

    const rank = document.createElement('div');
    rank.className = 'rank';
    rank.textContent = rankNum;
    row.appendChild(rank);

    const name = document.createElement('div');
    name.className = 'player-name';
    name.textContent = player.name;
    row.appendChild(name);

    if(player.age){
      const age = document.createElement('div');
      age.className = 'player-age';
      age.textContent = 'السن: ' + player.age;
      row.appendChild(age);
    }

    return row;
  }

  function renderResult(teamDocs){
    const resultList = document.getElementById('resultList');
    resultList.innerHTML = '';

    const hasGroups = teamDocs.some(d => d.group);

    if(!hasGroups){
      const list = document.createElement('div');
      list.className = 'result-list';
      const sorted = teamDocs.slice().sort((a,b) => (a.order||0) - (b.order||0));
      sorted.forEach((team, i) => list.appendChild(buildRow(normalizeTeamAsPlayer(team), i + 1, i)));
      resultList.appendChild(list);
      return;
    }

    const groupsMap = {};
    teamDocs.forEach(t => {
      const g = t.group || 'بدون مجموعة';
      if(!groupsMap[g]) groupsMap[g] = [];
      groupsMap[g].push(t);
    });
    const groupNames = Object.keys(groupsMap).sort((a,b) => {
      const na = parseInt((a.match(/\d+/) || [0])[0]);
      const nb = parseInt((b.match(/\d+/) || [0])[0]);
      return na - nb;
    });

    let rowIndex = 0;
    groupNames.forEach(gName => {
      const title = document.createElement('div');
      title.className = 'group-title';
      title.textContent = gName;
      resultList.appendChild(title);

      const list = document.createElement('div');
      list.className = 'result-list';
      const teams = groupsMap[gName].slice().sort((a,b) => (a.groupOrder||0) - (b.groupOrder||0));
      teams.forEach((team, ti) => {
        list.appendChild(buildRow(normalizeTeamAsPlayer(team), ti + 1, rowIndex));
        rowIndex++;
      });
      resultList.appendChild(list);
    });
  }

  // الصفحة دي بتعرض نتيجة القرعة بس؛ عمل/إعادة القرعة بقى من لوحة التحكم (admin.html) بس
  db.collection('teams')
    .where('game', '==', game)
    .where('stage', '==', stage)
    .onSnapshot(snapshot => {
      if(snapshot.empty){
        showScreen(emptyScreen);
        return;
      }
      const docs = [];
      snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
      renderResult(docs);
      showScreen(resultScreen);
    }, err => {
      document.getElementById('resultList').innerHTML =
        '<div class="empty-hint">في خطأ في تحميل البيانات: ' + err.message + '</div>';
      showScreen(resultScreen);
    });
</script>

</body>
</html>
