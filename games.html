<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الألعاب | دوري التسلية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0714;
    --bg2:#150a29;
    --violet:#a855f7;
    --pink:#f0399e;
    --cyan:#22e0e0;
    --lime:#b6ff3c;
    --amber:#ffb020;
    --text:#f7f4ff;
    --text-dim:#a79ecb;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    padding:56px 20px 70px;
    position:relative;
    overflow-x:hidden;
  }

  /* ---------- Animated neon blob background ---------- */
  .blobs{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
  }
  .blobs::before,
  .blobs::after{
    content:'';
    position:absolute;
    width:52vw;
    height:52vw;
    max-width:620px;
    max-height:620px;
    border-radius:50%;
    filter:blur(90px);
    opacity:0.38;
  }
  .blobs::before{
    top:-14%;
    right:-12%;
    background:radial-gradient(circle, var(--violet), transparent 70%);
    animation:drift1 16s ease-in-out infinite;
  }
  .blobs::after{
    bottom:-16%;
    left:-10%;
    background:radial-gradient(circle, var(--cyan), transparent 70%);
    animation:drift2 18s ease-in-out infinite;
  }
  .blob-mid{
    position:absolute;
    top:38%;
    left:50%;
    width:40vw;
    height:40vw;
    max-width:480px;
    max-height:480px;
    border-radius:50%;
    filter:blur(100px);
    opacity:0.22;
    background:radial-gradient(circle, var(--pink), transparent 70%);
    transform:translate(-50%,-50%);
    animation:drift3 20s ease-in-out infinite;
  }
  @keyframes drift1{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(-6%,8%) scale(1.1);}
  }
  @keyframes drift2{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(6%,-8%) scale(1.08);}
  }
  @keyframes drift3{
    0%,100%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-46%,-56%) scale(1.15);}
  }
  .grain{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    opacity:0.4;
    background-image:radial-gradient(rgba(255,255,255,0.5) 0.5px, transparent 0.5px);
    background-size:3px 3px;
    mix-blend-mode:overlay;
  }

  header{
    position:relative;
    z-index:1;
    text-align:center;
    margin-bottom:52px;
  }
  .logo-small{
    position:absolute;
    top:0;
    right:20px;
    z-index:2;
    width:56px;
    height:auto;
    filter:drop-shadow(0 0 14px rgba(168,85,247,0.4));
  }
  .grid-wrap{
    position:relative;
    max-width:1040px;
    margin:0 auto;
  }
  .logo-watermark{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:min(60vw, 420px);
    height:auto;
    opacity:0.16;
    z-index:0;
    pointer-events:none;
    filter:drop-shadow(0 0 30px rgba(168,85,247,0.25));
  }
  header .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:linear-gradient(90deg, var(--pink), var(--violet), var(--cyan));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    letter-spacing:5px;
    font-family:'Orbitron',sans-serif;
    font-size:12px;
    font-weight:800;
    text-transform:uppercase;
  }
  header h1{
    font-size:clamp(32px, 6vw, 50px);
    font-weight:900;
    margin-top:12px;
    color:var(--text);
    text-shadow:0 0 40px rgba(168,85,247,0.35);
    letter-spacing:0.5px;
  }
  header p{
    color:var(--text-dim);
    margin-top:10px;
    font-size:14px;
  }

  .grid{
    position:relative;
    z-index:1;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:22px;
    perspective:1200px;
  }

  .card{
    --mx:50%;
    --my:50%;
    --accent:var(--violet);
    background:#120a22;
    border-radius:20px;
    text-align:center;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    height:238px;
    transform-style:preserve-3d;
    will-change:transform;
    opacity:0;
    transform:translateY(30px) scale(0.92);
    animation:cardIn 0.7s cubic-bezier(.2,.8,.2,1) forwards;
    animation-delay:calc(var(--i) * 100ms);
  }
  @keyframes cardIn{
    to{opacity:1; transform:translateY(0) scale(1);}
  }

  /* gradient border ring */
  .ring{
    position:absolute;
    inset:0;
    border-radius:20px;
    padding:2px;
    background:linear-gradient(135deg, var(--accent), transparent 40%, transparent 60%, var(--accent));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    opacity:0.55;
    z-index:3;
    pointer-events:none;
    transition:opacity .3s ease;
  }

  .card-inner{
    position:absolute;
    inset:2px;
    border-radius:18px;
    overflow:hidden;
    transform-style:preserve-3d;
  }

  .card img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scale(1.04);
    transition:transform .45s ease, filter .45s ease;
    filter:saturate(1.1) brightness(0.98) contrast(1.05);
  }
  .card::after{
    content:'';
    position:absolute;
    inset:2px;
    border-radius:18px;
    background:linear-gradient(180deg, rgba(10,7,20,0) 45%, rgba(10,7,20,0.88) 92%);
    z-index:1;
    pointer-events:none;
  }

  .sheen{
    position:absolute;
    inset:0;
    z-index:2;
    opacity:0;
    background:radial-gradient(280px circle at var(--mx) var(--my),
      rgba(255,255,255,0.30), color-mix(in srgb, var(--accent) 55%, transparent) 35%, transparent 62%);
    mix-blend-mode:screen;
    transition:opacity .35s ease;
    pointer-events:none;
  }

  .card:hover,
  .card:focus-visible{
    outline:none;
  }
  .card:hover .ring{opacity:1;}
  .card:hover img{
    transform:scale(1.12);
    filter:saturate(1.2) brightness(1.05) contrast(1.05);
  }
  .card:hover .sheen{opacity:1;}
  .card:hover{
    box-shadow:
      0 20px 46px rgba(0,0,0,0.55),
      0 0 34px color-mix(in srgb, var(--accent) 55%, transparent);
  }

  .card-label{
    position:absolute;
    bottom:0;
    right:0;
    left:0;
    padding:18px 14px 20px;
    z-index:3;
    transform:translateZ(32px);
  }
  .card h2{
    font-size:19px;
    font-weight:800;
  }
  .card span.tag{
    display:block;
    margin-top:6px;
    font-family:'Orbitron',sans-serif;
    font-size:10px;
    font-weight:700;
    letter-spacing:2.5px;
    color:var(--accent);
  }

  .corner-badge{
    position:absolute;
    top:12px;
    left:12px;
    z-index:3;
    width:28px;
    height:28px;
    border-radius:50%;
    border:1px solid color-mix(in srgb, var(--accent) 60%, transparent);
    background:rgba(10,7,20,0.55);
    backdrop-filter:blur(3px);
    display:flex;
    align-items:center;
    justify-content:center;
    transform:translateZ(36px);
    box-shadow:0 0 14px color-mix(in srgb, var(--accent) 45%, transparent);
  }
  .corner-badge svg{width:14px;height:14px;stroke:var(--accent);}

  /* per-card accent assignment */
  .card:nth-child(1){--accent:var(--lime);}
  .card:nth-child(2){--accent:var(--violet);}
  .card:nth-child(3){--accent:var(--amber);}
  .card:nth-child(4){--accent:var(--cyan);}
  .card:nth-child(5){--accent:var(--pink);}

  @media (max-width:480px){
    body{padding:40px 14px 50px;}
    header h1{font-size:27px;}
    .grid{grid-template-columns:repeat(2,1fr); gap:14px;}
    .card{height:196px;}
  }

  @media (hover:none){
    .sheen{display:none;}
    .ring{opacity:0.5;}
  }
</style>
</head>
<body>

<div class="blobs"><div class="blob-mid"></div></div>
<div class="grain"></div>

<header>
  <img class="logo-small" src="logo.png" alt="لجنة الأنشطة والمسابقات">
  <div class="eyebrow">دوري التسلية</div>
  <h1>اختر اللعبة</h1>
  <p>اضغط على الكرت للدخول</p>
</header>

<div class="grid-wrap">
<img class="logo-watermark" src="logo.png" alt="لجنة الأنشطة والمسابقات">
<div class="grid" id="grid">

  <div class="card" style="--i:0" tabindex="0" data-href="football.html">
    <div class="ring"></div>
    <div class="card-inner">
      <img src="football.webp" alt="كورة">
      <div class="sheen"></div>
      <div class="corner-badge"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg></div>
      <div class="card-label">
        <h2>كورة</h2>
        <span class="tag">FOOTBALL</span>
      </div>
    </div>
  </div>

  <div class="card" style="--i:1" tabindex="0" data-href="chess.html">
    <div class="ring"></div>
    <div class="card-inner">
      <img src="chess.jpg" alt="شطرنج">
      <div class="sheen"></div>
      <div class="corner-badge"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 3v18M4 21h16"/></svg></div>
      <div class="card-label">
        <h2>شطرنج</h2>
        <span class="tag">CHESS</span>
      </div>
    </div>
  </div>

  <div class="card" style="--i:2" tabindex="0" data-href="domino.html">
    <div class="ring"></div>
    <div class="card-inner">
      <img src="domino.jpg" alt="دومينو">
      <div class="sheen"></div>
      <div class="corner-badge"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="4" y="3" width="16" height="18" rx="2"/></svg></div>
      <div class="card-label">
        <h2>دومينو</h2>
        <span class="tag">DOMINO</span>
      </div>
    </div>
  </div>

  <div class="card" style="--i:3" tabindex="0" data-href="playstation.html">
    <div class="ring"></div>
    <div class="card-inner">
      <img src="playstation.jpg" alt="بلايستيشن">
      <div class="sheen"></div>
      <div class="corner-badge"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="6" width="18" height="12" rx="3"/></svg></div>
      <div class="card-label">
        <h2>بلايستيشن</h2>
        <span class="tag">PLAYSTATION</span>
      </div>
    </div>
  </div>

  <div class="card" style="--i:4" tabindex="0" data-href="pingpong.html">
    <div class="ring"></div>
    <div class="card-inner">
      <img src="pingpong.jpg" alt="بينج بونج">
      <div class="sheen"></div>
      <div class="corner-badge"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg></div>
      <div class="card-label">
        <h2>بينج بونج</h2>
        <span class="tag">PING PONG</span>
      </div>
    </div>
  </div>

</div>
</div>

<script>
  const cards = document.querySelectorAll('.card');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const supportsHover = window.matchMedia('(hover: hover)').matches;

  cards.forEach(card => {
    const go = () => { window.location.href = card.dataset.href; };
    card.addEventListener('click', go);
    card.addEventListener('keydown', e => {
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); go(); }
    });

    if(reduceMotion || !supportsHover) return;

    const inner = card.querySelector('.card-inner');
    const maxTilt = 12;

    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const px = (e.clientX - rect.left) / rect.width;
      const py = (e.clientY - rect.top) / rect.height;

      const tiltX = (0.5 - py) * maxTilt;
      const tiltY = (px - 0.5) * maxTilt;

      inner.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) translateZ(0)`;
      card.style.setProperty('--mx', `${px * 100}%`);
      card.style.setProperty('--my', `${py * 100}%`);
    });

    card.addEventListener('mouseleave', () => {
      inner.style.transform = 'rotateX(0deg) rotateY(0deg) translateZ(0)';
    });
  });
</script>

</body>
</html>
