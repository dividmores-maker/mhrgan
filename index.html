<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لجنة الأنشطة والمسابقات - بأبرشية برج العرب والعامرية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black-deep: #08070a;
            --black-mid: #12100f;
            --gold-bright: #c99a3f;
            --gold-glow: #e8c468;
            --gold-light: #f4dfa0;
            --navy-accent: #1e2a44;
            --white: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--black-deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201, 154, 63, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(232, 196, 104, 0.18) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 20% 70%, rgba(30, 42, 68, 0.35) 0%, transparent 50%),
                linear-gradient(180deg, #08070a 0%, #0f0d12 40%, #060508 100%);
        }

        /* Floating orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: floatOrb 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(201, 154, 63, 0.25);
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(232, 196, 104, 0.15);
            bottom: 10%;
            right: -50px;
            animation-delay: -3s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: rgba(30, 42, 68, 0.3);
            bottom: 20%;
            left: -30px;
            animation-delay: -5s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            33% { transform: translateY(-20px) translateX(10px); }
            66% { transform: translateY(10px) translateX(-10px); }
        }

        /* Grid lines */
        .grid-lines {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(201, 154, 63, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201, 154, 63, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 500px;
        }

        /* Logo image */
        .logo-wrapper {
            width: 150px;
            height: 150px;
            margin: 0 auto 28px;
            position: relative;
            animation: fadeSlideDown 0.8s ease both, logoPulse 3s ease-in-out infinite;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 25px rgba(232, 196, 104, 0.55));
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        /* Logo badge */
        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(201, 154, 63, 0.12);
            border: 1px solid rgba(232, 196, 104, 0.3);
            border-radius: 50px;
            padding: 10px 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            animation: fadeSlideDown 0.8s ease 0.15s both;
        }

        .logo-text {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold-light);
            letter-spacing: 1px;
        }

        /* Main title */
        .main-title {
            font-size: clamp(26px, 6.5vw, 38px);
            font-weight: 900;
            line-height: 1.35;
            color: var(--white);
            margin-bottom: 10px;
            animation: fadeSlideDown 0.8s ease 0.4s both;
        }

        .title-highlight {
            background: linear-gradient(135deg, var(--gold-light), var(--gold-glow), var(--gold-bright));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(232, 196, 104, 0.5));
            display: block;
        }

        /* Subtitle */
        .subtitle {
            font-size: 15px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
            animation: fadeSlideDown 0.8s ease 0.6s both;
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            max-width: 280px;
            margin: 0 auto 20px;
            animation: fadeSlideDown 0.8s ease 0.7s both;
        }

        .progress-track {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--gold-bright), var(--gold-light), var(--gold-glow));
            box-shadow: 0 0 10px rgba(232, 196, 104, 0.8);
            animation: progressLoad 1.2s ease forwards;
            width: 0%;
        }

        @keyframes progressLoad {
            0% { width: 0%; }
            60% { width: 70%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }

        /* Loading text */
        .loading-text {
            font-size: 13px;
            color: rgba(232, 196, 104, 0.85);
            font-weight: 600;
            animation: fadeSlideDown 0.8s ease 0.8s both, blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--gold-light);
            animation: floatParticle linear infinite;
            opacity: 0;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
        }

        /* Glow lines */
        .glow-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(232, 196, 104, 0.5), transparent);
            animation: scanLine 4s ease-in-out infinite;
            left: 0;
            right: 0;
            opacity: 0;
        }

        .glow-line-1 { top: 30%; animation-delay: 0s; }
        .glow-line-2 { top: 60%; animation-delay: 2s; }

        @keyframes scanLine {
            0% { opacity: 0; transform: scaleX(0); }
            50% { opacity: 1; transform: scaleX(1); }
            100% { opacity: 0; transform: scaleX(0); }
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Decorative dots */
        .dot-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(232, 196, 104, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
        }
    </style>
</head>
<body>

        <div class="bg-gradient"></div>
        <div class="dot-grid"></div>
        <div class="grid-lines"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="glow-line glow-line-1"></div>
        <div class="glow-line glow-line-2"></div>
    </div>

    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="logo-badge">
