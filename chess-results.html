<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النتائج</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0714;
    --bg2:#150a29;
    --violet:#a855f7;
    --pink:#f0399e;
    --cyan:#22e0e0;
    --lime:#b6ff3c;
    --amber:#ffb020;
    --text:#f7f4ff;
    --text-dim:#a79ecb;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    padding:24px 20px 70px;
    position:relative;
    overflow-x:hidden;
  }

  .blobs{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .blobs::before,.blobs::after{
    content:''; position:absolute; width:52vw; height:52vw; max-width:620px; max-height:620px;
    border-radius:50%; filter:blur(90px); opacity:0.35;
  }
  .blobs::before{ top:-14%; right:-12%; background:radial-gradient(circle, var(--violet), transparent 70%); animation:drift1 16s ease-in-out infinite; }
  .blobs::after{ bottom:-16%; left:-10%; background:radial-gradient(circle, var(--cyan), transparent 70%); animation:drift2 18s ease-in-out infinite; }
  .blob-mid{
    position:absolute; top:38%; left:50%; width:40vw; height:40vw; max-width:480px; max-height:480px;
    border-radius:50%; filter:blur(100px); opacity:0.2; background:radial-gradient(circle, var(--pink), transparent 70%);
    transform:translate(-50%,-50%); animation:drift3 20s ease-in-out infinite;
  }
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-6%,8%) scale(1.1);}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(6%,-8%) scale(1.08);}}
  @keyframes drift3{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-46%,-56%) scale(1.15);}}
  .grain{
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.4;
    background-image:radial-gradient(rgba(255,255,255,0.5) 0.5px, transparent 0.5px);
    background-size:3px 3px; mix-blend-mode:overlay;
  }
  .logo-watermark{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:min(60vw, 420px);
    height:auto;
    opacity:0.14;
    z-index:0;
    pointer-events:none;
    filter:drop-shadow(0 0 30px rgba(168,85,247,0.25));
  }

  .back-btn{
    position:relative; z-index:1;
    display:inline-flex; align-items:center; gap:6px;
    color:var(--text-dim); text-decoration:none; font-size:13px;
    border:1px solid rgba(168,85,247,0.28);
    background:rgba(21,10,41,0.5);
    padding:8px 16px; border-radius:999px;
    backdrop-filter:blur(4px);
    transition:border-color .2s ease, color .2s ease, box-shadow .2s ease;
  }
  .back-btn:hover{ border-color:var(--violet); color:var(--text); box-shadow:0 0 16px rgba(168,85,247,0.3); }

  header{ position:relative; z-index:1; text-align:center; margin:30px 0 40px; }
  .logo-small{
    position:absolute; top:0; right:0; z-index:2; width:48px; height:auto;
    filter:drop-shadow(0 0 14px rgba(168,85,247,0.4));
  }
  header .eyebrow{
    display:inline-flex; align-items:center; gap:10px;
    background:linear-gradient(90deg, var(--pink), var(--violet), var(--cyan));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:5px; font-family:'Orbitron',sans-serif; font-size:11px; font-weight:800; text-transform:uppercase;
  }
  header h1{
    font-size:clamp(24px, 5vw, 32px); font-weight:900; margin-top:12px; color:var(--text);
    text-shadow:0 0 40px rgba(168,85,247,0.35); letter-spacing:0.5px;
  }
  header p{ color:var(--text-dim); margin-top:8px; font-size:14px; }

  .panel{
    position:relative; z-index:1;
    max-width:560px;
    margin:0 auto;
    background:linear-gradient(160deg, var(--bg2), #0e0620);
    border:1px solid rgba(168,85,247,0.22);
    border-radius:20px;
    padding:28px 24px;
    box-shadow:0 0 40px rgba(168,85,247,0.08);
  }
  .group-title{
    font-size:13px;
    background:linear-gradient(90deg, var(--violet), var(--pink));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:.5px; font-weight:800;
    margin:22px 4px 12px;
  }
  .group-title:first-child{ margin-top:0; }
  .match-row{
    display:flex; align-items:center; gap:12px;
    background:rgba(168,85,247,0.06);
    border:1px solid rgba(168,85,247,0.18);
    border-radius:14px; padding:14px 16px; margin-bottom:10px;
    transition:border-color .2s ease, background .2s ease;
  }
  .match-row:hover{ border-color:rgba(168,85,247,0.4); background:rgba(168,85,247,0.1); }
  .match-row.played{ border-color:rgba(34,224,224,0.35); }
  .match-row .player-name{
    flex:1; font-size:14px; font-weight:700; text-align:center;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .match-row .score{ min-width:30px; text-align:center; font-weight:900; font-size:16px; color:var(--cyan); }
  .match-row .score.empty{ color:var(--text-dim); font-size:12px; font-weight:700; }
  .match-row .sep{ color:var(--text-dim); font-size:12px; flex:0 0 auto; }

  .ko-round-title{
    font-size:13px;
    background:linear-gradient(90deg, var(--amber), var(--pink));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:.5px; font-weight:800;
    margin:22px 4px 12px;
  }
  .ko-bye-row{
    background:rgba(182,255,60,0.06);
    border:1px solid rgba(182,255,60,0.25);
    border-radius:14px; padding:12px 16px; margin-bottom:10px;
    font-size:13px; text-align:center; color:var(--lime); font-weight:700;
  }
  .ko-champion{
    text-align:center; margin-top:20px; padding:24px 16px;
    background:linear-gradient(160deg, rgba(255,176,32,0.12), rgba(240,57,158,0.08));
    border:1px solid rgba(255,176,32,0.35); border-radius:16px;
  }
  .ko-champion .trophy{ font-size:36px; margin-bottom:8px; }
  .ko-champion .champ-name{ font-size:20px; font-weight:900; color:var(--amber); }
  .ko-champion .champ-label{ font-size:12px; color:var(--text-dim); margin-top:6px; letter-spacing:.5px; }

  .spinner-wrap{ display:flex; flex-direction:column; align-items:center; gap:16px; padding:30px 0; }
  .spinner{
    width:52px; height:52px; border-radius:50%;
    border:3px solid rgba(168,85,247,0.2); border-top-color:var(--violet);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .hint{ text-align:center; color:var(--text-dim); font-size:13px; }
  .empty-hint{ text-align:center; color:var(--text-dim); font-size:14px; padding:50px 10px; }
  .screen{ display:none; }
  .screen.active{ display:block; }
</style>
</head>
<body>

<div class="blobs"><div class="blob-mid"></div></div>
<div class="grain"></div>
<img class="logo-watermark" src="logo.png" alt="لجنة الأنشطة والمسابقات">

<a class="back-btn" id="backLink" href="chess-stage.html">→ رجوع للمرحلة</a>

<header>
  <img class="logo-small" src="logo.png" alt="لجنة الأنشطة والمسابقات">
  <div class="eyebrow">دوري التسلية</div>
  <h1 id="pageTitle">النتائج</h1>
  <p id="pageSubtitle">مباريات كل مجموعة والنتايج بينهم</p>
</header>

<div class="panel">

  <div class="screen active" id="loadingScreen">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="hint">بنجيب المباريات...</div>
    </div>
  </div>

  <div class="screen" id="emptyScreen">
    <div class="empty-hint">لسه مفيش مباريات متولدة للمرحلة دي</div>
  </div>

  <div class="screen" id="matchesScreen">
    <div id="matchesList"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA3-lEsXUrT-TV8aPMFnfqK32SPpkS2UXY",
    authDomain: "mhrgan-f86f9.firebaseapp.com",
    projectId: "mhrgan-f86f9",
    storageBucket: "mhrgan-f86f9.firebasestorage.app",
    messagingSenderId: "105084606310",
    appId: "1:105084606310:web:84f4433c113599eba29aa7"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const params = new URLSearchParams(window.location.search);
  const stage = params.get('stage') || '1';
  const game = 'chess';

  const stageNames = {
    '1': 'المرحلة الأولى',
    '2': 'المرحلة الثانية'
  };

  document.title = 'نتائج ' + (stageNames[stage] || 'المرحلة');
  document.getElementById('pageSubtitle').textContent = stageNames[stage] || 'المرحلة';
  document.getElementById('backLink').href = `chess-stage.html?stage=${stage}`;

  const loadingScreen = document.getElementById('loadingScreen');
  const emptyScreen = document.getElementById('emptyScreen');
  const matchesScreen = document.getElementById('matchesScreen');
  const screens = [loadingScreen, emptyScreen, matchesScreen];

  function showScreen(el){
    screens.forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  }

  function buildMatchRow(m){
    const row = document.createElement('div');
    row.className = 'match-row' + (m.played ? ' played' : '');

    const playerA = document.createElement('div');
    playerA.className = 'player-name';
    playerA.textContent = m.teamAName;
    row.appendChild(playerA);

    const scoreA = document.createElement('div');
    scoreA.className = m.scoreA != null ? 'score' : 'score empty';
    scoreA.textContent = m.scoreA != null ? m.scoreA : '-';
    row.appendChild(scoreA);

    const sep = document.createElement('div');
    sep.className = 'sep';
    sep.textContent = m.played ? '' : 'لسه';
    row.appendChild(sep);

    const scoreB = document.createElement('div');
    scoreB.className = m.scoreB != null ? 'score' : 'score empty';
    scoreB.textContent = m.scoreB != null ? m.scoreB : '-';
    row.appendChild(scoreB);

    const playerB = document.createElement('div');
    playerB.className = 'player-name';
    playerB.textContent = m.teamBName;
    row.appendChild(playerB);

    return row;
  }

  function buildKnockoutMatchRow(m){
    if(m.bye){
      const row = document.createElement('div');
      row.className = 'ko-bye-row';
      row.textContent = '🎟️ ' + m.teamAName + ' — تأهل تلقائي (راحة)';
      return row;
    }
    return buildMatchRow(m);
  }

  function roundNameForCount(n){
    if(n <= 2) return 'النهائي';
    if(n === 4) return 'نص النهائي';
    if(n === 8) return 'ربع النهائي';
    if(n === 16) return 'دور الـ16';
    return 'دور الـ' + n;
  }

  function renderKnockout(list, knockoutMatches){
    if(knockoutMatches.length === 0) return;

    const title = document.createElement('div');
    title.className = 'ko-round-title';
    title.style.marginTop = '30px';
    title.textContent = 'الأدوار الإقصائية';
    list.appendChild(title);

    const rounds = [...new Set(knockoutMatches.map(m => m.round))].sort((a,b) => a - b);
    let lastRoundWinners = [];
    let lastRoundName = '';
    let lastRoundAllDecided = false;

    rounds.forEach(roundNum => {
      const ms = knockoutMatches.filter(m => m.round === roundNum).sort((a,b) => (a.order||0) - (b.order||0));
      const roundName = ms[0].roundName || ('دور ' + roundNum);

      const rTitle = document.createElement('div');
      rTitle.className = 'ko-round-title';
      rTitle.textContent = roundName;
      list.appendChild(rTitle);

      ms.forEach(m => list.appendChild(buildKnockoutMatchRow(m)));

      lastRoundName = roundName;
      lastRoundAllDecided = ms.every(m => m.bye || m.winnerId);
      lastRoundWinners = ms.map(m => m.bye
        ? { id: m.teamAId, name: m.teamAName }
        : (m.winnerId ? { id: m.winnerId, name: m.winnerName } : null)
      );
    });

    if(lastRoundAllDecided && lastRoundName === 'النهائي'){
      const champ = lastRoundWinners[0];
      const banner = document.createElement('div');
      banner.className = 'ko-champion';
      banner.innerHTML =
        '<div class="trophy">🏆</div>' +
        '<div class="champ-name">' + (champ ? champ.name : '') + '</div>' +
        '<div class="champ-label">بطل الأدوار الإقصائية</div>';
      list.appendChild(banner);
    }
  }

  function renderMatches(matches){
    const list = document.getElementById('matchesList');
    list.innerHTML = '';

    const groupMatches = matches.filter(m => m.group && !m.round);
    const knockoutMatches = matches.filter(m => m.round != null);

    const groupsMap = {};
    groupMatches.forEach(m => {
      const g = m.group || 'بدون مجموعة';
      if(!groupsMap[g]) groupsMap[g] = [];
      groupsMap[g].push(m);
    });
    const groupNames = Object.keys(groupsMap).sort((a,b) => {
      const na = parseInt((a.match(/\d+/) || [0])[0]);
      const nb = parseInt((b.match(/\d+/) || [0])[0]);
      return na - nb;
    });

    groupNames.forEach(gName => {
      const title = document.createElement('div');
      title.className = 'group-title';
      title.textContent = gName;
      list.appendChild(title);

      const ms = groupsMap[gName].slice().sort((a,b) => (a.order||0) - (b.order||0));
      ms.forEach(m => list.appendChild(buildMatchRow(m)));
    });

    renderKnockout(list, knockoutMatches);
  }

  db.collection('matches')
    .where('game', '==', game)
    .where('stage', '==', stage)
    .onSnapshot(snapshot => {
      if(snapshot.empty){
        showScreen(emptyScreen);
        return;
      }
      const matches = [];
      snapshot.forEach(doc => matches.push(doc.data()));
      renderMatches(matches);
      showScreen(matchesScreen);
    }, err => {
      document.getElementById('matchesList').innerHTML =
        '<div class="empty-hint">في خطأ في تحميل البيانات: ' + err.message + '</div>';
      showScreen(matchesScreen);
    });
</script>

</body>
</html>
