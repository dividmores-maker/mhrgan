<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفرق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;
    --bg2:#161a22;
    --gold:#d4af37;
    --gold-soft:#e9c766;
    --text:#f2f0ea;
    --text-dim:#9aa0ab;
    --line:rgba(212,175,55,0.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 20% 10%, rgba(212,175,55,0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(212,175,55,0.05), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    padding:24px 20px 60px;
  }
  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:var(--text-dim);
    text-decoration:none;
    font-size:13px;
    border:1px solid var(--line);
    padding:8px 14px;
    border-radius:999px;
    transition:border-color .2s ease, color .2s ease;
  }
  .back-btn:hover{border-color:var(--gold);color:var(--gold-soft);}
  header{
    text-align:center;
    margin:30px 0 40px;
  }
  header .eyebrow{
    color:var(--gold);
    letter-spacing:4px;
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
  }
  header h1{
    font-size:30px;
    font-weight:900;
    margin-top:10px;
  }
  header p{
    color:var(--text-dim);
    margin-top:8px;
    font-size:14px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:18px;
    max-width:1000px;
    margin:0 auto;
  }
  .team-card{
    background:linear-gradient(160deg, var(--bg2), #10131a);
    border:1px solid var(--line);
    border-radius:16px;
    padding:22px;
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .team-card:hover{
    transform:translateY(-4px);
    border-color:var(--gold);
    box-shadow:0 14px 30px rgba(0,0,0,0.4);
  }
  .team-card h2{
    font-size:18px;
    font-weight:700;
    color:var(--gold-soft);
    margin-bottom:14px;
    padding-bottom:12px;
    border-bottom:1px solid var(--line);
  }
  .team-card ul{
    list-style:none;
  }
  .team-card li{
    display:flex;
    gap:10px;
    align-items:center;
    padding:8px 0;
    font-size:14px;
    color:var(--text);
  }
  .team-card li .n{
    color:var(--gold-soft);
    font-size:12px;
    font-weight:700;
    min-width:18px;
  }
  .no-players{
    color:var(--text-dim);
    font-size:13px;
    font-style:italic;
  }
  .empty-hint{
    text-align:center;
    color:var(--text-dim);
    font-size:14px;
    padding:60px 10px;
    max-width:500px;
    margin:0 auto;
    border:1px dashed var(--line);
    border-radius:16px;
  }
  @media (max-width:480px){
    header h1{font-size:24px;}
  }
</style>
</head>
<body>

<a class="back-btn" href="#" id="backLink">→ رجوع للمرحلة</a>

<header>
  <div class="eyebrow">دوري التسلية</div>
  <h1 id="pageTitle">الفرق</h1>
  <p>الفرق واللاعبين في المرحلة دي</p>
</header>

<div id="content">
  <div class="empty-hint">بيحمّل...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA3-lEsXUrT-TV8aPMFnfqK32SPpkS2UXY",
    authDomain: "mhrgan-f86f9.firebaseapp.com",
    projectId: "mhrgan-f86f9",
    storageBucket: "mhrgan-f86f9.firebasestorage.app",
    messagingSenderId: "105084606310",
    appId: "1:105084606310:web:84f4433c113599eba29aa7"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const params = new URLSearchParams(window.location.search);
  const stage = params.get('stage') || '1';
  const game = params.get('game') || 'football';

  const stageNames = {
    '1': 'المرحلة الأولى',
    '2': 'المرحلة الثانية',
    '3': 'المرحلة الثالثة',
    '4': 'المرحلة الرابعة'
  };

  document.getElementById('pageTitle').textContent = 'فرق ' + (stageNames[stage] || 'المرحلة');
  document.title = 'فرق ' + (stageNames[stage] || 'المرحلة');
  document.getElementById('backLink').href = `${game}-stage.html?stage=${stage}`;

  db.collection('teams')
    .where('game', '==', game)
    .where('stage', '==', stage)
    .onSnapshot(snapshot => {
      const content = document.getElementById('content');
      if(snapshot.empty){
        content.innerHTML = '<div class="empty-hint">مفيش فرق متضافة للمرحلة دي لسه</div>';
        return;
      }
      const docs = [];
      snapshot.forEach(doc => docs.push(doc.data()));
      docs.sort((a,b) => (a.order||0) - (b.order||0));

      const grid = document.createElement('div');
      grid.className = 'grid';

      docs.forEach(team => {
        const card = document.createElement('div');
        card.className = 'team-card';

        const h2 = document.createElement('h2');
        h2.textContent = team.name;
        card.appendChild(h2);

        const players = Array.isArray(team.players) ? team.players : [];
        if(players.length === 0){
          const p = document.createElement('div');
          p.className = 'no-players';
          p.textContent = 'مفيش لاعبين مضافين لسه';
          card.appendChild(p);
        } else {
          const ul = document.createElement('ul');
          players.forEach((name, idx) => {
            const li = document.createElement('li');
            const n = document.createElement('span');
            n.className = 'n';
            n.textContent = (idx+1) + '.';
            li.appendChild(n);
            const span = document.createElement('span');
            span.textContent = name;
            li.appendChild(span);
            ul.appendChild(li);
          });
          card.appendChild(ul);
        }

        grid.appendChild(card);
      });

      content.innerHTML = '';
      content.appendChild(grid);
    }, err => {
      document.getElementById('content').innerHTML =
        '<div class="empty-hint">في خطأ في تحميل البيانات: ' + err.message + '</div>';
    });
</script>

</body>
</html>
